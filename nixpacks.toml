[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@11.5.1",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @genki/db generate",
  "pnpm --filter @genki/shared build",
  "pnpm --filter api build"
]

[start]
cmd = "pnpm --filter @genki/db migrate:prod && node packages/api/dist/server.js"
